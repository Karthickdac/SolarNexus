openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: modbus
    description: Modbus reader ingestion operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /modbus/readings:
    get:
      operationId: listModbusReadings
      tags: [modbus]
      summary: List recent Modbus readings
      description: Returns recent payloads received from a Modbus reader.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Recent readings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModbusReadingsList"
    post:
      operationId: createModbusReading
      tags: [modbus]
      summary: Receive Modbus reader data
      description: Accepts HTTP JSON payloads from a Teltonika TRB246 or other Modbus reader.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModbusReadingIngestBody"
      responses:
        "200":
          description: Reading accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModbusReadingAck"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ModbusReadingIngestBody:
      type: object
      additionalProperties: true
      properties:
        deviceId:
          type: string
          description: Optional reader/device identifier. Defaults to "trb246" when omitted.
        timestamp:
          type: string
          format: date-time
          description: Optional timestamp generated by the reader.
        registers:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: integer
              - type: boolean
              - type: "null"
          description: Optional map of Modbus register addresses/names to values.
        values:
          type: object
          additionalProperties: true
          description: Optional decoded values sent by the reader.
        payload:
          description: Optional nested raw payload from the reader.
      minProperties: 1
    ModbusReading:
      type: object
      properties:
        id:
          type: integer
        deviceId:
          type: string
        source:
          type: ["string", "null"]
        parsingStatus:
          type: string
        rawPayload:
          type: object
          additionalProperties: true
        decodedValues:
          $ref: "#/components/schemas/ModbusDecodedValues"
        receivedAt:
          type: string
          format: date-time
      required:
        - id
        - deviceId
        - source
        - parsingStatus
        - rawPayload
        - decodedValues
        - receivedAt
    ModbusDecodedValues:
      type: object
      properties:
        status:
          type: string
          enum:
            - decoded
            - contains_unknown_registers
            - contains_invalid_registers
            - no_registers
        registers:
          type: array
          items:
            $ref: "#/components/schemas/ModbusDecodedRegister"
        providedValues:
          type: object
          additionalProperties: true
      required:
        - status
        - registers
        - providedValues
    ModbusDecodedRegister:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
        unit:
          type: ["string", "null"]
        status:
          type: string
          enum:
            - decoded
            - unknown
            - invalid
        value:
          type:
            - string
            - number
            - boolean
            - "null"
        rawValue: {}
        displayValue:
          type: string
        error:
          type: string
      required:
        - address
        - name
        - unit
        - status
        - value
        - rawValue
    ModbusReadingAck:
      type: object
      properties:
        accepted:
          type: boolean
        reading:
          $ref: "#/components/schemas/ModbusReading"
      required:
        - accepted
        - reading
    ModbusReadingsList:
      type: object
      properties:
        readings:
          type: array
          items:
            $ref: "#/components/schemas/ModbusReading"
      required:
        - readings
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

