kind = "data-app"
previewPath = "/"
title = "TRB246 Dashboard"
version = "1.0.0"
id = "artifacts/trb246-dashboard"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19321

[services.development]
run = "pnpm --filter @workspace/trb246-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trb246-dashboard", "run", "build" ]
publicDir = "artifacts/trb246-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19321"
BASE_PATH = "/"
